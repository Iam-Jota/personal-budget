<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Presupuesto Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="oop-objects.js" defer></script>   <!-- class Movimiento y Presupuesto, de C07 -->
<script src="app.js"defer></script>
  </head>
  
    <body class="min-h-screen bg-gray-50">
      <!-- ← P3: bg-gray-50 -->
      <main class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-6">
          <h1 class="text-3xl font-bold text-gray-800">
            💰 Gestor de Presupuesto
          </h1>
          <!-- ← P3 -->
          <p class="text-gray-500">Tu dinero, bajo control.</p>
          <!-- ← P3 -->
        </header>

       <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Tarjeta resumen -->
          
          <div class="p-6 bg-white rounded-xl shadow">
            <!-- ← P3: bg-white rounded-xl shadow -->
            <h2
              class="text-sm font-semibold text-gray-500 uppercase tracking-wide"
            >
              saldo
            </h2>
            <!-- ← P3 -->
            <p id= "saldo" class="mt-1 text-4xl font-bold text-gray-800">$3454.50</p>
            <!-- ← P3 -->
            <div class="flex gap-4 mt-4">
             <div class="flex-1 p-3 bg-green-50 rounded-lg">
  <p class="text-xs text-green-700">Ingresos</p>
  <p id="total-ingresos" class="text-lg font-semibold text-green-700">$0.00</p>
</div>
<div class="flex-1 p-3 bg-red-50 rounded-lg">
  <p class="text-xs text-red-700">Gastos</p>
  <p id="total-gastos" class="text-lg font-semibold text-red-700">$0.00</p>
</div>
            </div>
          </div>

          <!-- Tarjeta formulario -->
          <div class="p-6 bg-white rounded-xl shadow">
            <!-- ← P3 -->
            <h2 class="mb-4 text-lg font-semibold text-gray-800">
              Agregar movimiento
            </h2>
            <!-- ← P3 -->
            <form id="form-mov" class="space-y-3">
  <input id="nombre" type="text" placeholder="Nombre" class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
  <select id="tipo" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
    <option value="ingreso">Ingreso</option>
    <option value="gasto">Gasto</option>
  </select>
  <input id="monto" type="number" placeholder="Monto" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
  <button type="submit" class="w-full p-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">Agregar</button>
</form>
          </div>
        </section>

        <section class="mt-6 p-6 bg-white rounded-xl shadow">
          <!-- ← P3 -->
          <h2 class="mb-4 text-lg font-semibold text-gray-800">Movimientos</h2>
          <!-- ← P3 -->
          <ul id="lista" class="space-y-2">
            <!-- ← P3: barrita verde (ingreso) / roja (gasto), texto y montos con color -->
            <li
              class="flex items-center justify-between p-3 bg-green-50 border-l-4 border-green-500 rounded"
            >
              <span class="text-gray-800"
                ><span class="font-medium">Salario</span>
                <span class="text-xs text-gray-500">(ingreso)</span></span
              >
              <span class="font-semibold text-green-700">+$3000.00</span>
            </li>
            <li
              class="flex items-center justify-between p-3 bg-red-50 border-l-4 border-red-500 rounded"
            >
              <span class="text-gray-800"
                ><span class="font-medium">Cena</span>
                <span class="text-xs text-gray-500">(gasto)</span></span
              >
              <span class="font-semibold text-red-700">-$45.50</span>
            </li>
            <li
              class="flex items-center justify-between p-3 bg-green-50 border-l-4 border-green-500 rounded"
            >
              <span class="text-gray-800"
                ><span class="font-medium">Freelance</span>
                <span class="text-xs text-gray-500">(ingreso)</span></span
              >
              <span class="font-semibold text-green-700">+$500.00</span>
            </li>
          </ul>
        </section>
      </main>
    
  </body>
</html>
